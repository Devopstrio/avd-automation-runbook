apiVersion: apps/v1
kind: Deployment
metadata:
  name: avd-automation-api
  namespace: avd-ops-prod
  labels:
    app: automation-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automation-api
  template:
    metadata:
      labels:
        app: automation-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: fastapi-gateway
        image: acravdops.azurecr.io/devopstrio/automation-api:v1.0.0
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: avd-secrets
              key: db-url
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: avd-azure-auth
              key: client-id
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: avd-automation-svc
  namespace: avd-ops-prod
spec:
  selector:
    app: automation-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: avd-runbook-engine
  namespace: avd-ops-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runbook-engine
  template:
    metadata:
      labels:
        app: runbook-engine
    spec:
      containers:
      - name: engine-worker
        image: acravdops.azurecr.io/devopstrio/runbook-engine:v1.0.0
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
